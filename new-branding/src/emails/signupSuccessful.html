<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>You're on the list!</title>
  </head>

  <body style="margin: 0; padding: 0; background: #ffffff">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table width="100%" style="max-width: 900px">
            <tr>
              <td style="padding: 40px 20px">
                <table width="100%" cellpadding="0" cellspacing="0" style="margin-top: 40px; background: #faf9f9; border-radius: 20px">
                  <tr>
                    <td style="padding: 40px 40px 32px; font-family: Arial, Helvetica, sans-serif">
                      <table width="100%" cellpadding="0" cellspacing="0">
                        <tr>
                          <td align="center" style="padding-bottom: 24px">
                            <div style="width: 64px; height: 64px; background: #e6f4ea; border-radius: 50%; display: inline-block; line-height: 64px; text-align: center; font-size: 28px">✅</div>
                          </td>
                        </tr>
                      </table>

                      <h2 style="margin: 0 0 8px 0; font-size: 24px; text-align: center; color: #111">You're on the list!</h2>
                      <p style="margin: 0 0 32px 0; font-size: 14px; color: #888; text-align: center">Thanks for signing up. We'll notify you as soon as we have something for you.</p>

                      <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse">
                        <tr>
                          <td style="font-weight: bold; padding: 10px 0; width: 160px; border-bottom: 1px solid #eee; font-family: Arial, Helvetica, sans-serif; font-size: 14px">Email</td>
                          <td style="padding: 10px 0; border-bottom: 1px solid #eee; font-family: Arial, Helvetica, sans-serif; font-size: 14px">
                            <span style="color: #28a745">{{email}}</span>
                          </td>
                        </tr>
                      </table>

                      <p>
                        <a href="{{websiteUrl}}" style="color: #000; text-decoration: underline">Visit our website</a>
                      </p>
                      <p style="margin-top: 32px; font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #333">
                        Best regards,<br />
                        <strong>UTEXO Team</strong>
                      </p>
                    </td>
                  </tr>

                  <!-- Logo -->
                  <tr>
                    <td align="center" style="padding-bottom: 24px">
                      <img src="{{logo_url}}" width="110" height="35" style="display: block; margin: 0 auto" />
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
