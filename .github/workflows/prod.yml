name: "Release & Deploy to Prod"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.0.1)"
        required: true
        type: string

env:
  DOCKER_VERSION: ${{ github.sha }}
  NODE_VERSION: 20.x

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ inputs.version }} --target ${{ github.sha }} --title "${{ inputs.version }}" --generate-notes

  build-prod:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push docker images
        run: make docker ENVIRONMENT=-prod APP_DIR=new-branding IMAGE_TAG=${{ inputs.version }}

  deploy:
    needs: build-prod
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to PROD server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: ${{ secrets.PROD_DEPLOY_SCRIPT }}
